name: Release Binaries (Windows)

on:
  push:
    tags:
      - '*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: 386

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME:-$(date -u +%Y%m%d)}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        shell: cmd
        run: |
          if not exist dist mkdir dist
          go build -mod=vendor -ldflags "-X main.VERSION=${{ steps.version.outputs.version }} -s -w" ^
            -o dist\client_${{ matrix.goos }}_${{ matrix.goarch }}.exe github.com/xtaci/kcptun/client
          go build -mod=vendor -ldflags "-X main.VERSION=${{ steps.version.outputs.version }} -s -w" ^
            -o dist\server_${{ matrix.goos }}_${{ matrix.goarch }}.exe github.com/xtaci/kcptun/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kcptun-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.exe

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
